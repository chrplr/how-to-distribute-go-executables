<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello, 世界</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; }
  </style>
</head>
<body>
  <!-- wasm_exec.js is the Go runtime glue; copy it with: make web -->
  <script src="wasm_exec.js"></script>
  <script>
    if (!WebAssembly) {
      document.body.innerText = "WebAssembly is not supported in this browser.";
    } else {
      const go = new Go();
      WebAssembly.instantiateStreaming(
        fetch("hello-world-gui.wasm"),
        go.importObject
      ).then(result => {
        go.run(result.instance);
      }).catch(err => {
        document.body.innerText = "Failed to load wasm: " + err;
        console.error(err);
      });
    }
  </script>
</body>
</html>
